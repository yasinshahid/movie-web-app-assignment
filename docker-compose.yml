services:
  postgres:
    image: postgres:16-alpine
    container_name: movie_web_app_postgres
    environment:
      POSTGRES_DB: movie_web_app
      POSTGRES_USER: movie_web_app
      POSTGRES_PASSWORD: movie_web_app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
